{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Login to 💪GymBro </h4>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-bold shadow-sm custom-login-btn">
              Login
            </button>
          </form>
        </div>
        <div class="card-footer text-center text-muted small">
          Don't have an account?
          <a href="{% url 'tracker:register' %}">Register here</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
