<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymBro 💪 {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
      .clickable-row {
          cursor: pointer;
      }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'tracker:index' %}">💪 GymBro</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{% url 'tracker:index' %}">Home</a>
      <a class="nav-link" href="{% url 'tracker:exercise-list' %}">Exercises</a>
      <a class="nav-link" href="{% url 'tracker:muscle-group-list' %}">Muscle groups</a>
      <a class="nav-link" href="{% url 'tracker:workout-plan-list' %}">Workout plans</a>
      <a class="nav-link" href="{% url 'tracker:workout-log-list' %}">Training history</a>
      <a class="nav-link" href="{% url 'tracker:gym-user-list' %}">Users list</a>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% block content %}
  {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
