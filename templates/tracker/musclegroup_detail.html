{% extends "base.html" %}

{% block title %}Muscle Group Detail{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">{{ muscle_group.name }}</h4>
        </div>
        <div class="card-body">
          <div class="row mb-3">
            <div class="col-sm-4 text-muted">Name</div>
            <div class="col-sm-8 fw-semibold">{{ muscle_group.name }}</div>
          </div>
        </div>
        <div class="card-footer d-flex gap-2">
          <a href="{% url 'tracker:muscle-group-update' pk=muscle_group.pk %}" class="btn btn-warning btn-sm">Edit</a>
          <a href="{% url 'tracker:muscle-group-delete' pk=muscle_group.pk %}" class="btn btn-danger btn-sm">Delete</a>
          <a href="{% url 'tracker:muscle-group-list' %}" class="btn btn-secondary btn-sm ms-auto">Back to list</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
