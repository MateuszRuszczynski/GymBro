{% extends "base.html" %}

{% block title %}Muscle Groups{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Muscle Groups</h2>
    <a href="{% url 'tracker:muscle-group-create' %}"
       class="btn btn-dark rounded-pill px-4 py-2 fw-bold shadow-sm hover-lift">
      Add muscle group
    </a>
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    {% for muscle_group in muscle_groups %}
      <a href="{% url 'tracker:muscle-group-detail' pk=muscle_group.pk %}"
         class="text-decoration-none">
        <div class="col">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">{{ muscle_group.name }}</h5>
            </div>
          </div>
        </div>
      </a>
    {% empty %}
      <div class="col-12">
        <p class="text-muted">There are no muscle groups.</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
